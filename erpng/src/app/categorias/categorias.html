<section class="categorias-page">
  <div class="page-title">
    <h2>Categorías</h2>
    <button type="button" (click)="cargarCategorias()">Recargar</button>
  </div>

  <p *ngIf="loading()">Cargando categorías...</p>
  <p class="error" *ngIf="error()">{{ error() }}</p>

  <form class="categoria-form" (ngSubmit)="guardarCategoria()">
    <input
      type="text"
      name="nombre"
      placeholder="Nombre"
      [(ngModel)]="formNombre"
      required
    >

    <input
      type="text"
      name="descripcion"
      placeholder="Descripción"
      [(ngModel)]="formDescripcion"
      required
    >

    <button type="submit">{{ editandoId ? 'Guardar' : 'Agregar' }}</button>
    <button *ngIf="editandoId" type="button" class="secondary" (click)="cancelarEdicion()">Cancelar</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let categoria of categorias()">
        <td>{{ categoria.id }}</td>
        <td>{{ categoria.nombre }}</td>
        <td>{{ categoria.descripcion }}</td>
        <td class="actions">
          <button type="button" class="secondary" (click)="iniciarEdicion(categoria)">Editar</button>
          <button type="button" class="danger" (click)="eliminarCategoria(categoria.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</section>
